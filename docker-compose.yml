version: "3.9"

services:

  api:

    image: rag-resume-api:latest

    container_name: rag-api

    ports:
      - "8000:8000"


    environment:

      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333

      OLLAMA_HOST: http://host.docker.internal:11434
      OLLAMA_MODEL: qwen2.5:7b


    depends_on:

      - qdrant



  qdrant:

    image: qdrant/qdrant:latest

    container_name: qdrant


    ports:

      - "6333:6333"


    volumes:

      - qdrant_storage:/qdrant/storage



volumes:

  qdrant_storage: