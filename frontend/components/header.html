<!--
    Component: Dashboard Header
    Reference partial mirrored inside <header class="dashboard-header">
    at the top of <main class="application-main-content"> on each page.
    Update the title/subtitle per page context when copying inline.
-->
<header class="dashboard-header">

    <button class="mobile-nav-toggle" type="button" aria-label="Open navigation" data-mobile-nav-toggle>
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>

            <div class="header-title-container">
        <h1 class="dashboard-title">Dashboard</h1>
        <p class="dashboard-subtitle">Upload a resume and ask the assistant anything about it.</p>
    </div>

    <div class="header-action-container">

        <button class="theme-toggle-button" type="button" aria-label="Toggle dark mode">
            <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
            <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 14.5A8.5 8.5 0 0 1 9.5 4a8.5 8.5 0 1 0 10.5 10.5z"/></svg>
        </button>

        <button class="notification-button" type="button" aria-label="Notifications">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
            <span class="notification-badge" aria-hidden="true"></span>
        </button>

        <button class="profile-button" type="button" aria-label="Account menu">
            <span class="profile-button-avatar" aria-hidden="true">JD</span>
            <span class="profile-button-name">Jordan</span>
        </button>

    </div>

</header>
